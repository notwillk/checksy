rules:
  - name: interactive lifecycle
    timeout: 3s
    check: |
      printf 'interactive-check\n' >> "$CHECKSY_P0_INTERACTIVE_TRACE"
      test -f "$CHECKSY_P0_INTERACTIVE_FIXED"
    interactive-fix: |
      printf 'approval: '
      IFS= read -r answer
      if [ "$answer" != approve ]; then
        printf 'unexpected approval: %s\n' "$answer" >&2
        exit 23
      fi
      printf 'interactive-fix\n' >> "$CHECKSY_P0_INTERACTIVE_TRACE"
      : > "$CHECKSY_P0_INTERACTIVE_FIXED"
  - name: later interactive lifecycle rule
    timeout: 2s
    check: printf 'later-check\n' >> "$CHECKSY_P0_INTERACTIVE_TRACE"

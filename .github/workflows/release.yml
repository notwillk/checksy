name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag matches version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(grep -Eo 'VERSION: &str = "[^"]+"' src/version.rs | sed -E 's/VERSION: &str = "([^"]+)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version from version.rs" >&2
            exit 1
          fi
          if [ "v$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match version.rs v$VERSION" >&2
            exit 1
          fi

      - name: Build in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: just cross-compile ${{ matrix.target }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Package
        run: |
          OS=$(echo ${{ matrix.target }} | cut -d'-' -f3)
          ARCH=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          tar -czf checksy_${OS}_${ARCH}.tar.gz -C src/target/release checksy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksy-${{ matrix.target }}
          path: checksy_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: sha256sum checksy_*.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            checksy_*.tar.gz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
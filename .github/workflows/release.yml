name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install just
          else
            cargo install just --locked
          fi

      - name: Ensure tag matches version
        run: just ensure-tag-matches-version ${{ github.ref_name }}

      - name: Build and package
        run: just cross-compile ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksy-${{ matrix.target }}-artifact
          path: |
            dist/*.tar.gz
            dist/*-checksum.txt

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: cat artifacts/*-checksum.txt > artifacts/checksums.txt

      - name: Sign checksums
        run: |
          mkdir -p /tmp/gpg
          printf "%s" "${{ secrets.GPG_PRIVATE_KEY }}" > /tmp/gpg/release.key
          gpg --batch --import "/tmp/gpg/release.key"
          gpg --batch --yes --output "artifacts/checksums.txt.sig" --detach-sign "artifacts/checksums.txt"
          echo "Created checksums.txt.sig"
          rm -rf /tmp/gpg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Devcontainer Feature
        uses: devcontainers/action@v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-feature/src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

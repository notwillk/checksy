markerCases:
  - id: marker-local-valid
    fixture: state-store/markers/valid/local.json
    expected: accept
  - id: marker-git-sha1-valid
    fixture: state-store/markers/valid/git-sha1.json
    expected: accept
  - id: marker-git-sha256-valid
    fixture: state-store/markers/valid/git-sha256.json
    expected: accept
  - id: marker-https-valid
    fixture: state-store/markers/valid/https.json
    expected: accept
  - id: marker-incomplete
    fixture: state-store/markers/invalid/completed-false.json
    expected: reject
  - id: marker-authentication-event-field
    fixture: state-store/markers/invalid/signer-in-marker.json
    expected: reject
  - id: marker-git-object-length
    fixture: state-store/markers/invalid/git-format-length.json
    expected: reject
integrityScenarios:
  - id: open-complete-local
    marker: state-store/markers/valid/local.json
    bundle: state-store/bundle/basic
    expected: accept
  - id: reject-marker-directory-id-mismatch
    mutation: change-directory-generation-id
    expected: reject
  - id: reject-recomputed-generation-id-mismatch
    mutation: change-marker-provider-identity
    expected: reject
  - id: reject-bundle-content-tamper
    mutation: change-assets-message-byte
    expected: reject
  - id: reject-config-or-pattern-escape
    mutations:
      - nested-file-parent-traversal
      - absolute-pattern
    expected: reject-before-command
  - id: reject-unsafe-entry-types
    runtimeMaterialization:
      - symlink
      - hardlink
      - fifo
      - socket
    expected: reject
atomicSnapshotScenarios:
  - id: snapshot-old-or-new
    injectAt:
      - before-temp-write
      - during-temp-write
      - before-file-sync
      - before-rename
      - before-parent-sync
    assertion: lock-free-reader-observes-complete-old-or-complete-new-json
  - id: snapshot-sequence-monotonic
    initialSequence: 1
    publications: 3
    expectedFinalSequence: 4
leaseScenarios:
  - id: shared-reader-blocks-gc
    readerLease: shared
    garbageCollectionLease: exclusive-nonblocking
    expected: retain-and-retry-later
  - id: released-reader-allows-gc
    readerLease: released
    garbageCollectionLease: exclusive-nonblocking
    expected: prune
retentionScenarios:
  - id: generations-three
    preserve:
      - current
      - previous
      - newest-additional
    expectedMaximum: 3
  - id: failures-count-age
    expectedMaximum: 10
    maximumAge: 30d
  - id: audit-count-age-and-protection
    expectedMaximumOrdinary: 100
    maximumOrdinaryAge: 90d
    preserve:
      - current-generation-record
      - previous-generation-record
      - latest-rollback-record
    tieOrder:
      - timestamp-descending
      - record-id-ascending

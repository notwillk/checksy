name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install just
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install just
          else
            cargo install just --locked
          fi

      - name: Ensure tag matches version
        run: just ensure-tag-matches-version ${{ github.ref_name }}

      - name: Build and package
        run: just cross-compile ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksy-${{ matrix.target }}-artifact
          path: |
            dist/*.tar.gz
            dist/*-checksum.txt

  verify-linux:
    name: Verify Linux release (${{ matrix.arch }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: checksy-${{ matrix.target }}-artifact
          path: dist

      - name: Verify static Linux binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/verify
          tar -xzf "dist/checksy_linux_${{ matrix.arch }}.tar.gz" -C dist/verify
          expected_version="$(sed -n 's/^pub const VERSION: &str = "\(.*\)";$/\1/p' src/version.rs)"
          test -n "$expected_version"
          ./scripts/verify-static-linux-binary.sh dist/verify/checksy "$expected_version"
          smoke_config="$(mktemp)"
          trap 'rm -f "$smoke_config"' EXIT
          printf 'rules:\n  - name: static release smoke\n    check: test "$(uname -s)" = Linux\n' >"$smoke_config"
          dist/verify/checksy --config="$smoke_config" check --fix --non-interactive

  release:
    needs:
      - build
      - verify-linux
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: cat artifacts/*-checksum.txt > artifacts/checksums.txt

      - name: Sign checksums
        run: |
          mkdir -p /tmp/gpg
          printf "%s" "${{ secrets.GPG_PRIVATE_KEY }}" > /tmp/gpg/release.key
          gpg --batch --import "/tmp/gpg/release.key"
          gpg --batch --yes --output "artifacts/checksums.txt.sig" --detach-sign "artifacts/checksums.txt"
          echo "Created checksums.txt.sig"
          rm -rf /tmp/gpg

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Devcontainer Feature
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-feature/src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pre-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure tag matches version
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/release_container
          cacheFrom: ghcr.io/${{ github.repository }}/release_container
          runCmd: just ensure-tag-matches-version ${{ github.ref_name }}

  build:
    needs: pre-build
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate build environment then build in devcontainer
        uses: devcontainers/ci@v0.3
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          imageName: ghcr.io/${{ github.repository }}/release_container
          cacheFrom: ghcr.io/${{ github.repository }}/release_container
          runCmd: just can-build && just cross-compile ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksy-${{ matrix.target }}-artifact
          path: |
            dist/*.tar.gz
            dist/*-checksum.txt

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare checksums
        run: cat artifacts/*-checksum.txt > artifacts/checksums.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign checksums in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/release_container
          cacheFrom: ghcr.io/${{ github.repository }}/release_container
          runCmd: just sign artifacts/checksums.txt
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Devcontainer Feature
        uses: devcontainers/action@v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./devcontainer-feature/src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

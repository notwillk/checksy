schemaVersion: 1
status: contract-only

parsing:
  newCommandsAreStrict: true
  valueForms:
    - separate-token
    - equals
  rejectPositionals: true
  rejectDoubleDash: true
  booleanFlagsAreBareOnly: true
  rejectLegacyConfigFlags: true
  helpForms:
    - short
    - long
    - help-subcommand

exitCodes:
  success: 0
  missingLegacySubcommand: 1
  usageOrOperational: 2
  noncompliant: 3
  lockHeld: 4

interfaces:
  apply:
    directRequired:
      - --source
    enrolledRequired:
      - --enrollment
    directOnly:
      - --scope
      - --state-dir
      - --config-path
      - --trust-key
      - --allowed-signers
      - --policy
      - --replace-trust
      - --replace-policy
      - --allow-insecure-http
      - --allow-unsigned
    common:
      - --rollback-to
      - --rollback-reason
      - --non-interactive
    defaults:
      scopeForNonRoot: user
      rootRequiresExplicitSystem: true
      nonInteractive: false
      rollback: false
      allowInsecureHttp: false
      allowUnsigned: false
      replaceTrust: false
      replacePolicy: false
  status:
    selectors:
      - --enrollment
      - --source
      - --source-id
    optional:
      - --state-dir
      - --config-path
      - --live
      - --json
    defaults:
      selector: user-enrollment
      live: false
      output: human
  enroll:
    required:
      - --source
      - --scope
      - --interval
    optional:
      - --state-dir
      - --config-path
      - --trust-key
      - --allowed-signers
      - --policy
      - --replace
      - --apply-now
      - --non-interactive
    defaults:
      replace: false
      applyNow: false
      nonInteractive: false
      userPolicy: documented-user-default
      systemPolicy: none
  unenroll:
    required:
      - --scope
    optional:
      - --delete-state
      - --non-interactive
    defaults:
      deleteState: false
      nonInteractive: false

nonInteractive:
  readsStdinOrTty: false
  impliesConsent: false
  weakensValidation: false
  disablesCredentialPrompts: true
  incompatibleFlags:
    - --allow-insecure-http
    - --allow-unsigned
  explicitMutationFlagsRemainSufficient:
    - --replace-trust
    - --replace-policy
    - --rollback-to
    - --replace
    - --apply-now
    - --delete-state

interactiveExceptions:
  requireStdinTty: true
  requireStderrTty: true
  environmentConsentAccepted: false

sideEffectDefaults:
  network: false
  executeChecks: false
  executeFixes: false
  commandSideEffectsPossible: false
  promote: false
  replaceTrust: false
  replacePolicy: false
  writeReusableState: false
  writeAudit: false
  writeEnrollment: false
  writeScheduler: false
  removeEnrollment: false
  removeScheduler: false
  deleteEnrolledSourceState: false
  deleteUnrelatedState: false
  deleteLogs: false
  prompt: false

stdoutDefaults:
  apply: human
  status: human
  enroll: human
  unenroll: human
  statusJson: single-json-document
  help: help

cases:
  - id: cli-apply-direct-local-success
    argv:
      - checksy
      - apply
      - --source
      - /srv/checksy/source
    context:
      executor: non-root
      sourceType: local-directory
      finalCompliance: compliant
    expected:
      exit: 0
      errorCode: null
      sideEffects:
        executeChecks: true
        executeFixes: as-needed
        commandSideEffectsPossible: true
        promote: true
        writeReusableState: true
        writeAudit: true


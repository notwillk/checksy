schemaVersion: 1
cases:
  - id: file-and-stdin-fix
    fixture: file-fix.yaml
    assets:
      - scripts/record-fix.sh
    modes:
      - file
      - stdin-config
      - config-dash
    test: file_and_stdin_provisioning_share_one_lock
    expectedExit: 0
    expectedTrace:
      - check
      - fix
      - check
  - id: auto-discovered-fix
    fixture: autodiscovery/.checksy.yaml
    assets:
      - scripts/record-fix.sh
    modes:
      - auto-discovery
    test: auto_discovered_provisioning_uses_the_per_user_lock
    expectedExit: 0
  - id: blocking-fix-readiness
    fixture: blocking-fix.yaml
    assets:
      - scripts/blocking-fix.sh
    modes:
      - file-holder
      - stdin-holder
      - file-contender
      - stdin-contender
      - deprecated-diagnose-contender
    test: contention_precedes_commands_and_is_not_masked
    expectedContenderExit: 4
  - id: passing-fix-mode
    fixture: passing.yaml
    assets: []
    modes:
      - file-fix-holder
      - file-fix-contender
      - stdin-fix-contender
    test: passing_fix_mode_still_contends
    expectedHolderExit: 0
    expectedContenderExit: 4
  - id: check-only-under-held-lock
    fixture: passing.yaml
    assets: []
    modes:
      - file-check-only
      - stdin-check-only
    test: check_only_runs_remain_lock_free
    expectedExit: 0
  - id: compliance-failure-release
    fixture: failing-fix.yaml
    assets: []
    modes:
      - file-fix
      - file-fix-no-fail
    test: lock_releases_after_all_outcomes
    expectedExit: 3
    expectedNoFailExit: 0
  - id: invalid-before-lock
    fixture: invalid-no-execution.yaml
    assets: []
    modes:
      - file-fix
      - stdin-fix
      - invalid-invocation
    test: invalid_configuration_precedes_lock
    expectedExit: 2
  - id: cache-path-independent
    fixture: alternate-cache-path.yaml
    assets:
      - included-passing.yaml
    modes:
      - aliased-file-contender
      - alternate-cache-path-contender
    test: configuration_and_cache_aliases_share_the_lock
    expectedContenderExit: 4
  - id: legacy-missing-git-acquisition
    fixture: legacy-missing-git.yaml
    assets:
      - scripts/blocking-git.sh
    modes:
      - file-fix-contender
      - local-git-holder
      - file-fix-during-git
    test: legacy_git_acquisition_is_locked
    expectedHolderExit: 0
    expectedContenderExit: 4
    expectedProgress: false
    expectedCacheMutation: false
  - id: stale-lock-contents
    fixture: stale-lock-contents.txt
    assets: []
    modes:
      - primitive
    test: stale_contents_are_ignored_and_preserved
    expectedExit: 0

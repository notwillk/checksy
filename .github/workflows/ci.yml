name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run quality checks in devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          push: never
          runCmd: >-
            checksy --config=.devcontainer/checksy.yaml check --fix --non-interactive &&
            checksy --config=.devcontainer/checksy.yaml check --non-interactive &&
            bash -o pipefail -c "find .devcontainer/scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n" &&
            bash .devcontainer/scripts/tests/run.sh &&
            cd src &&
            cargo fmt --all -- --check &&
            cargo clippy --locked --all-targets --all-features &&
            sh -n ../scripts/install.sh &&
            sh -n ../scripts/uninstall.sh &&
            bash -n ../devcontainer-feature/src/checksy/test-version-resolution.sh &&
            bash ../devcontainer-feature/src/checksy/test-version-resolution.sh

  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --no-self-update

      - name: Build all targets
        run: cargo build --locked --all-targets --all-features

      - name: Run tests
        run: cargo test --locked --all-features --no-fail-fast
